<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="A simple quote generator that allows you to fetch, save, and view your favorite quotes.">
    <title>Motiva — Discover, Save & Revisit Inspiring Quotes</title>
    <link rel="stylesheet" href="./style.css">
    <link rel="icon" href="./quote.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;1,500&display=swap" rel="stylesheet">
</head>
<body>
    <main class="app">
        <header class="app-header">
            <div class="brand">
                <img src="./quote.png" alt="" class="brand-mark" width="36" height="36">
                <h1>Motiva</h1>
            </div>
            <p class="tagline">Discover, save and revisit quotes that move you.</p>
        </header>

        <section class="card" aria-label="Quote display">
            <div class="card-accent" aria-hidden="true">&ldquo;</div>
            <ul class="quote-list" id="presentQuote">
                <!-- Quotes will appear here as list items -->
            </ul>
        </section>

        <nav class="actions" aria-label="Quote actions">
            <button type="button" class="btn btn-primary" onclick="fetchQuote()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-3.5-7.1"/><polyline points="21 4 21 10 15 10"/></svg>
                <span>Get Quote</span>
            </button>
            <button type="button" class="btn btn-success" onclick="saveQuote()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/></svg>
                <span>Save Quote</span>
            </button>
            <button type="button" class="btn btn-secondary" onclick="showFavQuotes()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                <span>Favorites</span>
            </button>
            <button type="button" class="btn btn-danger" onclick="clearStorage()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-2 14a2 2 0 0 1-2 2H9a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/></svg>
                <span>Delete All</span>
            </button>
        </nav>

        <footer class="app-footer">
            <small>Quotes powered by API Ninjas · Saved locally in your browser</small>
        </footer>
    </main>
    <script type="module" src="app.js"></script>
</body>
</html>
